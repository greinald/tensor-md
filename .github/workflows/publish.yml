name: Publish package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tensor-md
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify release version
        run: |
          package_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          tag_version="${GITHUB_REF_NAME#v}"
          test "$package_version" = "$tag_version" || {
            echo "Release tag $GITHUB_REF_NAME does not match package version $package_version."
            exit 1
          }

      - name: Install test and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]" build twine

      - name: Run tests
        run: python -m pytest -q

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
